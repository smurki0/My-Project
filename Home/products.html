<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جميع المنتجات | استآر</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-color: #d4af37;
            --font-main: 'Cairo', sans-serif;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font-main); background-color: var(--bg-color); color: var(--text-primary); line-height: 1.7; font-weight:300; overflow-x:hidden; }

        a { text-decoration:none; color:inherit; }
        ul { list-style:none; }

        header {
            position:fixed; top:0; width:100%;
            padding:1rem 5%;
            display:flex; justify-content:space-between; align-items:center;
            z-index:1000;
            background: rgba(10,10,10,0.85);
            backdrop-filter: blur(10px);
            border-bottom:1px solid rgba(255,255,255,0.05);
            height:80px;
        }
        .logo { display:flex; align-items:center; font-size:1.5rem; font-weight:700; }
        .logo-img { height:180px; margin-left:10px; }
        .logo span { color: var(--accent-color); font-weight:300; }

        nav ul { display:flex; gap:2rem; }
        nav a { font-weight:300; transition: color 0.3s; }
        nav a:hover, nav a.active { color: var(--accent-color); }

        .cart-icon { position:relative; cursor:pointer; }
        .cart-count {
            position:absolute; top:-5px; right:-5px;
            background: var(--accent-color); color:#000;
            width:18px; height:18px; border-radius:50%;
            display:flex; justify-content:center; align-items:center;
            font-size:0.7rem; font-weight:600;
        }

        .page-header { padding:120px 5% 40px 5%; text-align:center; }
        .page-header h1 { font-size:3rem; font-weight:200; margin-bottom:2rem; }

        .filter-container { display:flex; justify-content:center; gap:1rem; flex-wrap:wrap; }
        .filter-btn {
            padding:10px 30px; border:1px solid rgba(255,255,255,0.1);
            background:transparent; color: var(--text-secondary);
            border-radius:50px; cursor:pointer;
            font-family: var(--font-main); font-weight:300;
            transition: var(--transition);
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent-color); color: var(--accent-color);
            background: rgba(212,175,55,0.05);
        }

        .products-showcase { padding:2rem 5% 6rem 5%; min-height:80vh; }
        .products-grid {
            display:grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap:2.5rem;
        }

        .product-card {
            background-color: var(--card-bg); border-radius:12px;
            overflow:hidden; border:1px solid rgba(255,255,255,0.03);
            transition: var(--transition); position:relative;
        }
        .product-card:hover { transform: translateY(-10px); box-shadow:0 15px 30px rgba(0,0,0,0.3); border-color: rgba(212,175,55,0.2); }
        .product-card.hide { display:none; }
        .product-card.show { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }

        .product-image { width:100%; height:350px; object-fit:cover; filter: grayscale(20%); transition: transform 0.6s ease, filter 0.6s ease; }
        .product-card:hover .product-image { transform: scale(1.05); filter: grayscale(0%); }

        .product-info { padding:1.5rem; text-align:center; }
        .product-category { font-size:0.8rem; color: var(--accent-color); margin-bottom:0.5rem; display:block; }
        .product-title { font-size:1.1rem; font-weight:400; margin-bottom:0.5rem; min-height:3rem; }
        .product-price { font-size:1.1rem; color: var(--text-secondary); font-weight:300; margin-bottom:1rem; }

        .card-actions { display:flex; gap:10px; justify-content:center; }
        .add-btn {
            padding:8px 20px; background: var(--text-primary); color:#000;
            border:none; border-radius:6px;
            font-family: var(--font-main); font-weight:600;
            cursor:pointer; transition:0.3s; flex:1;
        }
        .add-btn:hover { background: var(--accent-color); }

        .toast {
            position:fixed; bottom:30px; right:30px;
            background: rgba(20,20,20,0.95); color:#fff;
            padding:1rem 2rem; border-right:4px solid var(--accent-color);
            border-radius:4px; transform: translateX(200%);
            transition: all 0.5s ease; z-index:2000;
        }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">
        <img src="/Asttar/Warm_Ivory_and_Sable_Arabic_Calligraphy_Logo-removebg-preview.png" alt="Logo" class="logo-img">
        <!-- <div>أستآر</div> -->
    </a>

    <nav>
        <ul>
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="#">الأقسام</a></li>
            <li><a href="products.html" class="active">المنتجات</a></li>
        </ul>
    </nav>

    <div class="cart-icon" onclick="window.location.href='cart.html'">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
        <span class="cart-count" id="cart-count">0</span>
    </div>
</header>

<section class="page-header">
    <h1>مجموعة الأناقة الكاملة</h1>
    <div class="filter-container">
        <button class="filter-btn active" onclick="filterProducts('all', this)">الكل</button>
        <!-- <button class="filter-btn" onclick="filterProducts('abayas', this)">العبايات</button>
        <button class="filter-btn" onclick="filterProducts('khemar', this)">خمار</button>
        <button class="filter-btn" onclick="filterProducts('ednaa', this)">أدناء</button>
        <button class="filter-btn" onclick="filterProducts('coat', this)">معطف</button> -->
    </div>
</section>

<section class="products-showcase">
    <div class="products-grid" id="productsGrid"></div>
</section>

<div id="toast" class="toast">تمت إضافة المنتج للسلة</div>

<script>
const API_URL = "http://localhost:3000/api/products";
const grid = document.getElementById("productsGrid");

let cart = JSON.parse(localStorage.getItem("cart")) || [];

fetch(API_URL)
  .then(res => res.json())
  .then(products => {
    products.forEach(p => {
      const card = document.createElement('div');
      card.className = 'product-card show';
      card.dataset.category = p.category || "all";

      card.innerHTML = `
        <img src="${p.image}" class="product-image" alt="${p.name}">
        <div class="product-info">
            <span class="product-category">${p.category || ""}</span>
            <h3 class="product-title">${p.name}</h3>
            <p class="product-price">${p.price} ج.م</p>
            <div class="card-actions">
                <button class="add-btn" onclick='addToCart(${JSON.stringify(p)})'>
                  اضف الي السله
                </button>
            </div>
        </div>
      `;
      grid.appendChild(card);
    });
    updateCartCount();
  })
  .catch(err => console.error("خطأ في تحميل المنتجات:", err));


// ✅ إضافة للسلة
function addToCart(product){
  cart.push({
    id: product.id,
    name: product.name,
    price: product.price,
    image: product.image,
    quantity: 1
  });

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
  showToast("تمت إضافة المنتج للسلة");
}


// ✅ تحديث عداد السلة
function updateCartCount(){
  document.getElementById("cart-count").innerText = cart.length;
}


// الفلاتر
function filterProducts(category, btnElement) {
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  btnElement.classList.add('active');

  document.querySelectorAll('.product-card').forEach(card => {
    if(category === 'all' || card.dataset.category === category){
        card.classList.remove('hide');
        card.classList.add('show');
    } else {
        card.classList.remove('show');
        card.classList.add('hide');
    }
  });
}


// Toast
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.innerText = msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 2500);
}
</script>


</body>
</html>
