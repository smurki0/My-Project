<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- ========== LOGIN ========== -->
<div id="loginBox" class="login-box">
  <h2>تسجيل دخول الأدمن</h2>
  <input id="user" placeholder="اسم المستخدم">
  <input id="pass" type="password" placeholder="كلمة المرور">
  <button type="button" onclick="login()">دخول</button>
</div>

<!-- ========== ADMIN PANEL ========== -->
<div id="panel" class="panel" style="display:none">

<h1>لوحة التحكم</h1>

<!-- ================= إحصائيات ================= -->
<div class="stats">
  <div class="stat-card">
    <h3>إجمالي الأرباح</h3>
    <p id="totalRevenue">0 ج.م</p>
  </div>
  <div class="stat-card">
    <h3>عدد الطلبات</h3>
    <p id="totalSales">0</p>
  </div>
</div>

<!-- ADD PRODUCT -->
<div class="card">
  <h3>إضافة / تعديل منتج</h3>
  <div class="form-group">
    <input id="name" placeholder="اسم المنتج">
    <input id="price" placeholder="السعر">
    <input id="image" placeholder="رابط الصورة">
    <input id="description" placeholder="الوصف">
  </div>
  <button type="button" onclick="addProduct(event)" class="save-btn">حفظ</button>
</div>

<!-- PRODUCTS -->
<div class="card">
  <h3>المنتجات</h3>
  <input id="search" placeholder="بحث عن منتج..." onkeyup="searchProducts()">
  <div id="products" class="grid"></div>
</div>

<!-- ORDERS -->
<div class="card">
  <h3>الطلبات</h3>
  <div id="orders" class="orders-box"></div>
</div>

</div>

<script src="admin.js"></script>
</body>
</html>
